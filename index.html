<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Wizard · CheatSheet + Constructor Visual</title>
    <!-- Fuentes & Estética -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- leader-line para conexiones visuales (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/leader-line@1.0.7/leader-line.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0f17 0%, #141a26 100%);
            color: #eef3fc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            line-height: 1.5;
        }

        .app-wrapper {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-section h1 {
            font-weight: 700;
            font-size: 2.4rem;
            background: linear-gradient(135deg, #b1e5ff, #7fc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: rgba(20, 40, 70, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 500;
            border: 1px solid rgba(100, 180, 255, 0.2);
            color: #bdd9ff;
        }

        .main-dashboard {
            display: grid;
            grid-template-columns: 1fr 2.2fr;
            gap: 20px;
            margin-bottom: 20px;
            transition: grid-template-columns 0.3s;
        }

        .generator-collapsed .main-dashboard {
            grid-template-columns: 0fr 1fr;
        }

        .generator-collapsed .generator-panel {
            opacity: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        /* Panel Izquierdo: Constructor Visual */
        .generator-panel {
            background: rgba(12, 22, 36, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(72, 146, 255, 0.25);
            box-shadow: 0 20px 30px -10px #00000080;
            height: fit-content;
            transition: all 0.3s;
        }

        .gen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .gen-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            gap: 10px;
            color: #d3e5ff;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .tool-btn {
            background: #1a2e45;
            border: 1px solid #2e4b6e;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .tool-btn.active {
            background: #2a5d9c;
            border-color: #6bb1ff;
        }

        .canvas-area {
            background: #0a111c;
            border-radius: 24px;
            padding: 16px;
            min-height: 350px;
            border: 1px dashed #3e5f80;
            position: relative;
            margin-bottom: 20px;
        }

        #topologyCanvas {
            position: relative;
            width: 100%;
            min-height: 320px;
            background-image: radial-gradient(circle at 20px 20px, #1e3a5a 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .canvas-device {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #132433;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 12px #00000060;
            border: 2px solid #2e6090;
            color: white;
            cursor: grab;
            user-select: none;
            transition: 0.1s;
            padding: 6px;
        }

        .canvas-device.router {
            border-color: #e6b800;
        }

        .canvas-device.switch {
            border-color: #3e9cff;
        }

        .canvas-device.pc {
            border-color: #6fcf97;
        }

        .canvas-device i {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .canvas-device span {
            font-size: 12px;
            font-weight: 600;
        }

        /* panel de propiedades */
        .props-panel {
            background: #0e1a28;
            border-radius: 20px;
            padding: 1.2rem;
            margin: 15px 0;
            border-left: 4px solid #3e9cff;
        }

        .props-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .props-label {
            color: #aac2e5;
            font-size: 0.8rem;
        }

        .connection-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        select.input-field {
            background: #0d1824;
            color: white;
        }

        .generated-config {
            margin-top: 1.5rem;
            background: #0a121e;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #3e7fb4;
        }

        .config-block {
            background: #050a10;
            border-radius: 16px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: #cfdef5;
            max-height: 250px;
            overflow-y: auto;
        }

        /* Panel Derecho: CheatSheet */
        .cheatsheet-panel {
            background: rgba(12, 22, 36, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem 2rem;
            border: 1px solid rgba(72, 146, 255, 0.15);
            box-shadow: 0 25px 40px -12px #000000b0;
            overflow-y: auto;
            max-height: 880px;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #2a4057;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: #9aafc9;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .tab-btn.active {
            color: white;
            background: #1f405e;
            border-bottom: 3px solid #3e9cff;
        }

        .command-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }

        .command-card {
            background: #0f1a26;
            border-radius: 18px;
            padding: 1.2rem;
            border: 1px solid #253c56;
        }

        .terminal-block {
            background: #0b121c;
            border-radius: 14px;
            padding: 0.8rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            border-left: 5px solid #2d6bb8;
            margin-bottom: 10px;
        }

        .prompt {
            color: #7eb6ff;
            margin-right: 6px;
        }

        .keyword {
            color: #ffb86b;
        }

        .arg {
            color: #6fcf97;
        }

        .description {
            color: #b6cae2;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        .collapse-btn {
            background: none;
            border: none;
            color: #9cb9e0;
            font-size: 1.4rem;
            cursor: pointer;
        }

        /* Mejoras visuales generales */
        .tool-btn {
            background: linear-gradient(145deg, #1a2e45, #0f1e2e);
            border: 1px solid #3e6a9c;
            color: #e0edff;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
        }

        .tool-btn:hover {
            background: linear-gradient(145deg, #2a4a6e, #1a3050);
            border-color: #5a9eff;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .tool-btn.active {
            background: linear-gradient(145deg, #2a6db0, #1a4a80);
            border-color: #8fc4ff;
            box-shadow: 0 0 15px rgba(62, 156, 255, 0.4);
        }

        .tool-btn i {
            font-size: 1rem;
        }

        /* Botón Limpiar con estilo destructivo */
        .tool-btn.clear-btn {
            background: linear-gradient(145deg, #5a2a2a, #3a1a1a);
            border-color: #c44;
            color: #ffcccc;
        }

        .tool-btn.clear-btn:hover {
            background: linear-gradient(145deg, #7a3a3a, #5a2a2a);
            border-color: #f66;
        }

        /* Canvas con mejor apariencia */
        .canvas-area {
            background: #0a111c;
            border-radius: 24px;
            padding: 20px;
            min-height: 380px;
            border: 2px dashed #3e5f80;
            position: relative;
            margin-bottom: 20px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #topologyCanvas {
            position: relative;
            width: 100%;
            min-height: 360px;
            background-image:
                radial-gradient(circle at 30px 30px, #1e3a5a 1.5px, transparent 1.5px),
                radial-gradient(circle at 70px 120px, #1e3a5a 1.5px, transparent 1.5px);
            background-size: 80px 80px, 120px 120px;
        }

        /* Dispositivos del canvas más estilizados */
        .canvas-device {
            position: absolute;
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #1a2e45, #0f1a26);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid #3e7fb4;
            color: white;
            cursor: grab;
            user-select: none;
            transition: all 0.15s;
            padding: 8px;
            backdrop-filter: blur(4px);
        }

        .canvas-device:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(62, 156, 255, 0.3);
            border-color: #6bb1ff;
        }

        .canvas-device.router {
            border-color: #f0b000;
            background: linear-gradient(145deg, #2a3a1a, #1a2a0f);
        }

        .canvas-device.switch {
            border-color: #3e9cff;
            background: linear-gradient(145deg, #1a2a4a, #0f1a30);
        }

        .canvas-device.pc {
            border-color: #5fcf8f;
            background: linear-gradient(145deg, #1a3a2a, #0f2a1a);
        }

        .canvas-device i {
            font-size: 32px;
            margin-bottom: 6px;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.4));
        }

        .canvas-device span {
            font-size: 12px;
            font-weight: 700;
            text-shadow: 0 2px 4px black;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Panel de propiedades mejorado */
        .props-panel {
            background: linear-gradient(145deg, #0e1a28, #081018);
            border-radius: 24px;
            padding: 1.5rem;
            margin: 15px 0;
            border-left: 5px solid #3e9cff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        .props-panel h4 {
            color: #b8d2ff;
            font-size: 1.3rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-field {
            background: #0a1420;
            border: 2px solid #2a4a6e;
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .input-field:focus {
            border-color: #5a9eff;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), 0 0 12px rgba(90, 158, 255, 0.3);
        }

        /* Botón principal mejorado */
        .btn-primary {
            background: linear-gradient(145deg, #1a5d9c, #0e3a6a);
            border: 1px solid #5a9eff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(90, 158, 255, 0.1);
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 14px 24px;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #2a7bcc, #1a5d9c);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 20px rgba(90, 158, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Flecha de colapso mejorada */
        .collapse-btn {
            background: rgba(30, 50, 80, 0.6);
            border: 1px solid #3e6a9c;
            border-radius: 40px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aac8ff;
            font-size: 1.4rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .collapse-btn:hover {
            background: #2a4a7a;
            color: white;
            transform: scale(1.05);
        }

        /* Bloque de configuración generada */
        .generated-config {
            background: linear-gradient(145deg, #0a121e, #050a12);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #3e7fb4;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .config-block {
            background: #02060a;
            border-radius: 16px;
            padding: 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: #c5def5;
            border: 1px solid #2a4a6e;
            box-shadow: inset 0 0 20px #00000080;
        }

        .generator-collapsed .generator-panel {
            width: 0;
            min-width: 0;
            padding: 0;
            margin: 0;
            opacity: 0;
            overflow: hidden;
        }

        /* Flecha flotante para reabrir cuando está colapsado */
        .generator-collapsed .main-dashboard {
            position: relative;
        }

        .generator-collapsed .main-dashboard::before {
            content: "⏵";
            position: absolute;
            left: -10px;
            top: 20px;
            background: #1a3a5a;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 0 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 12px black;
            border: 1px solid #3e9cff;
            font-size: 20px;
            transition: 0.2s;
        }

        .generator-collapsed .main-dashboard::before:hover {
            background: #2a6db0;
            left: -5px;
        }
    </style>
</head>

<body>
    <div class="app-wrapper" id="appWrapper">
        <div class="header">
            <div class="title-section">
                <h1><i class="fas fa-network-wired"></i> Cisco Forge</h1>
            </div>
            <div class="badge"><i class="fas fa-sync-alt"></i> Constructor Visual + CheatSheet</div>
        </div>

        <div class="main-dashboard">
            <!-- GENERADOR VISUAL (colapsable) -->
            <div class="generator-panel" id="generatorPanel">
                <div class="gen-header">
                    <div class="gen-title"><i class="fas fa-draw-polygon"></i> Topología Visual</div>
                    <button class="collapse-btn" onclick="toggleGenerator()"><i class="fas fa-chevron-left"
                            id="collapseIcon"></i></button>
                </div>
                <div class="toolbar">
                    <button class="tool-btn" onclick="setMode('select')" id="modeSelect"><i
                            class="fas fa-mouse-pointer"></i> Seleccionar</button>
                    <button class="tool-btn" onclick="addDevice('pc')"><i class="fas fa-desktop"></i> Añadir PC</button>
                    <button class="tool-btn" onclick="addDevice('switch')"><i class="fas fa-code-branch"></i> Añadir
                        Switch</button>
                    <button class="tool-btn" onclick="addDevice('router')"><i class="fas fa-router"></i> Añadir
                        Router</button>
                    <button class="tool-btn" onclick="setMode('connect')" id="modeConnect"><i class="fas fa-plug"></i>
                        Modo Conectar</button>
                    <button class="tool-btn clear-btn" onclick="clearAll()"><i class="fas fa-trash-alt"></i> Limpiar
                        todo</button>
                </div>

                <div class="canvas-area">
                    <div id="topologyCanvas"></div>
                </div>

                <!-- Panel de propiedades del dispositivo seleccionado -->
                <div class="props-panel" id="propsPanel" style="display: none;">
                    <h4 style="display:flex; gap:8px; margin-bottom:12px;"><i class="fas fa-sliders-h"></i> Propiedades
                    </h4>
                    <div id="devicePropsForm"></div>
                    <button class="btn tool-btn" style="margin-top:12px;" onclick="updateDeviceProps()">Aplicar
                        cambios</button>
                </div>

                <button class="btn btn-primary" style="width:100%; margin: 15px 0;" onclick="generateFullConfig()">
                    <i class="fas fa-terminal"></i> Generar configuración de la topología
                </button>

                <div class="generated-config" id="configOutputContainer" style="display: none;">
                    <h4 style="display:flex; gap:8px;"><i class="fas fa-clipboard-list"></i> Script de Comandos</h4>
                    <br>
                    <div class="config-block" id="configOutputText"></div>
                    <button class="btn tool-btn" style="margin-top:10px;" onclick="copyConfig()"><i
                            class="far fa-copy"></i>
                        Copiar</button>
                </div>
            </div>

            <!-- CHEATSHEET -->
            <div class="cheatsheet-panel">
                <div class="tabs-container">
                    <button class="tab-btn active" data-tab="routing-vlans"><i class="fas fa-project-diagram"></i>
                        Routing+VLANs</button>
                    <button class="tab-btn" data-tab="routing"><i class="fas fa-route"></i> Routing</button>
                    <button class="tab-btn" data-tab="vlans"><i class="fas fa-layer-group"></i> VLANs</button>
                    <button class="tab-btn" data-tab="acls"><i class="fas fa-lock"></i> ACLs</button>
                </div>
                <div id="cheatsheetContent"></div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // =========================================================================
            // DATOS COMPLETOS DEL CHEATSHEET (EXTRAÍDOS DE LOS ARCHIVOS TXT)
            // =========================================================================

            // Routing+VLANs (mezclado)
            const routingVlansData = {
                title: 'Routing + VLANs (Router-on-a-stick)',
                sections: [
                    {
                        heading: 'Comandos básicos de acceso y CLI',
                        commands: [
                            { cmd: 'enable', prompt: 'Router> / Switch>', desc: 'Modo Privileged EXEC (Router# / Switch#)' },
                            { cmd: 'configure terminal', prompt: 'Router# / Switch#', desc: 'Entra a configuración global' },
                            { cmd: 'exit', prompt: '(config)', desc: 'Sube un nivel' },
                            { cmd: 'end', prompt: '(cualquier submodo)', desc: 'Sale directamente a Privileged EXEC' },
                            { cmd: 'show running-config', prompt: 'Router# / Switch#', desc: 'Muestra configuración actual' },
                            { cmd: 'show startup-config', prompt: 'Router# / Switch#', desc: 'Configuración guardada en NVRAM' },
                            { cmd: 'copy running-config startup-config', prompt: 'Router# / Switch#', desc: 'Guarda la configuración (write)' }
                        ]
                    },
                    {
                        heading: 'VLANs en el switch',
                        commands: [
                            { cmd: 'vlan 10', prompt: 'Switch(config)#', desc: 'Crea VLAN 10 y entra a su configuración' },
                            { cmd: 'name NOMBRE', prompt: 'Switch(config-vlan)#', desc: 'Asigna nombre descriptivo a la VLAN' },
                            { cmd: 'show vlan brief', prompt: 'Switch#', desc: 'Lista VLANs y puertos asignados' },
                            { cmd: 'show vlan id 10', prompt: 'Switch#', desc: 'Detalle de VLAN 10' }
                        ]
                    },
                    {
                        heading: 'Asignar puertos a VLANs (access/trunk)',
                        commands: [
                            { cmd: 'interface fastEthernet 0/1', prompt: 'Switch(config)#', desc: 'Entra al puerto' },
                            { cmd: 'switchport mode access', prompt: 'Switch(config-if)#', desc: 'Modo access (una VLAN)' },
                            { cmd: 'switchport access vlan 10', prompt: 'Switch(config-if)#', desc: 'Asigna puerto a VLAN 10' },
                            { cmd: 'no switchport access vlan 10', prompt: 'Switch(config-if)#', desc: 'Quita asignación' },
                            { cmd: 'switchport mode trunk', prompt: 'Switch(config-if)#', desc: 'Modo trunk (múltiples VLANs)' },
                            { cmd: 'show interfaces trunk', prompt: 'Switch#', desc: 'Muestra puertos trunk y VLANs permitidas' }
                        ]
                    },
                    {
                        heading: 'Router-on-a-stick (subinterfaces)',
                        commands: [
                            { cmd: 'interface g0/0', prompt: 'Router(config)#', desc: 'Interfaz física' },
                            { cmd: 'no shutdown', prompt: 'Router(config-if)#', desc: 'Activa interfaz física' },
                            { cmd: 'interface g0/0.10', prompt: 'Router(config)#', desc: 'Subinterfaz para VLAN 10' },
                            { cmd: 'encapsulation dot1Q 10', prompt: 'Router(config-subif)#', desc: 'Encapsulación 802.1Q VLAN 10' },
                            { cmd: 'ip address 192.168.10.1 255.255.255.0', prompt: 'Router(config-subif)#', desc: 'Gateway de VLAN 10' },
                            { cmd: 'show ip interface brief', prompt: 'Router#', desc: 'Estado de interfaces y subinterfaces' },
                            { cmd: 'show interface g0/0.10', prompt: 'Router#', desc: 'Detalle de subinterfaz' }
                        ]
                    },
                    {
                        heading: 'Routing estático',
                        commands: [

            window.clearAll = function () {
                // Borrar todos los dispositivos
                devices = [];
                // Borrar todas las conexiones
                connections = [];
                // Reiniciar el contador de IDs
                nextId = 0;
                // Limpiar selección
                selectedDeviceId = null;
                connectFrom = null;

                // Limpiar las líneas visuales
                lines.forEach(l => l.remove());
                lines = [];

                // Limpiar el canvas
                renderCanvas();

                // Ocultar panel de propiedades
                document.getElementById('propsPanel').style.display = 'none';

                // Ocultar el contenedor de configuración generada
                document.getElementById('configOutputContainer').style.display = 'none';

                // Limpiar el texto de configuración

                // Cambiar a modo selección
                setMode('select');
            };

            // =========================================================================
            // RENDERIZADO DEL CHEATSHEET
            // =========================================================================
            function renderCheatsheet(data) {
                let html = `<h3 style="font-size:1.8rem; margin-bottom:20px; display:flex; gap:12px;"><i class="fas fa-book"></i> ${data.title}</h3>`;
                data.sections.forEach(sec => {
                    html += `<h4 style="color:#b8d2ff; margin:24px 0 12px; border-bottom:1px solid #2e4b6e; padding-bottom:6px;">${sec.heading}</h4><div class="command-grid">`;
                    sec.commands.forEach(c => {
                        let parts = c.cmd.split(' ');
                        let firstWord = parts[0];
                        let rest = parts.slice(1).join(' ');
                        let formattedRest = rest.replace(/(\d+\.\d+\.\d+\.\d+(\/\d+)?|\d+\.\d+\.\d+\.\d+)/g, '<span class="arg">$&</span>')
                            .replace(/(fastEthernet|g0\/0|serial|fa0\/\d+|s0\/\d+)/gi, '<span class="arg">$&</span>');
                        html += `<div class="command-card">
            <div class="terminal-block">
              <span class="prompt">${c.prompt}</span> 
              <span class="keyword">${firstWord}</span> ${formattedRest}
            </div>
            <div class="description"><i class="fas fa-info-circle" style="margin-right:6px;color:#3e9cff;"></i>${c.desc}</div>
          </div>`;
                    });
                    html += `</div>`;
                });
                document.getElementById('cheatsheetContent').innerHTML = html;
            }

            // Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    if (tab === 'routing-vlans') renderCheatsheet(routingVlansData);
                    else if (tab === 'routing') renderCheatsheet(routingData);
                    else if (tab === 'vlans') renderCheatsheet(vlansData);
                    else renderCheatsheet(aclsData);
                });
            });
            renderCheatsheet(routingVlansData);

            // =========================================================================
            // GENERADOR VISUAL DE TOPOLOGÍA (MEJORADO)
            // =========================================================================
            let devices = [];
            let connections = [];
            let nextId = 0;
            let mode = 'select';
            let selectedDeviceId = null;
            let connectFrom = null;
            let lines = [];

            const canvas = document.getElementById('topologyCanvas');

            window.toggleGenerator = function () {
                const wrapper = document.getElementById('appWrapper');
                const icon = document.getElementById('collapseIcon');
                const panel = document.getElementById('generatorPanel');

                wrapper.classList.toggle('generator-collapsed');

                if (wrapper.classList.contains('generator-collapsed')) {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                    // Opcional: mostrar un tooltip o indicador flotante
                } else {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                }
                // Añadir event listener para la flecha flotante
                document.querySelector('.main-dashboard')?.addEventListener('click', (e) => {
                    if (document.getElementById('appWrapper').classList.contains('generator-collapsed') &&
                        e.target === document.querySelector('.main-dashboard')) {
                        toggleGenerator();
                    }
                });
            };

            window.setMode = function (m) {
                mode = m;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`mode${m.charAt(0).toUpperCase() + m.slice(1)}`)?.classList.add('active');
                connectFrom = null;
            };

            window.addDevice = function (type) {
                const count = devices.filter(d => d.type === type).length;
                const name = type.toUpperCase() + (count + 1);
                const id = nextId++;
                let x = 40 + Math.random() * 250;
                let y = 40 + Math.random() * 180;
                const device = { id, type, name, x, y, props: {} };

                if (type === 'pc') {
                    device.props = {
                        ip: '192.168.1.10',
                        mask: '255.255.255.0',
                        gateway: '192.168.1.1',
                        vlan: '1',
                        switchPort: 'fa0/1'
                    };
                } else if (type === 'switch') {
                    device.props = {
                        trunkPort: 'fa0/24',
                        vlanRanges: [] // { vlan: '10', range: 'fa0/1-5' }
                    };
                } else if (type === 'router') {
                    device.props = {
                        lanInterface: 'g0/0',
                        lanIp: '192.168.1.1',
                        lanMask: '255.255.255.0',
                        serialInterface: 's0/0/0',
                        serialIp: '10.0.0.1',
                        serialMask: '255.255.255.252',
                        nextHop: '10.0.0.2'
                    };
                }
                devices.push(device);
                renderCanvas();
            };

            function renderCanvas() {
                canvas.innerHTML = '';
                devices.forEach(d => {
                    const el = document.createElement('div');
                    el.className = `canvas-device ${d.type}`;
                    el.style.left = d.x + 'px';
                    el.style.top = d.y + 'px';
                    el.id = `dev-${d.id}`;
                    el.innerHTML = `<i class="fas fa-${d.type === 'pc' ? 'desktop' : d.type === 'switch' ? 'code-branch' : 'router'}"></i><span>${d.name}</span>`;
                    el.addEventListener('click', (e) => { e.stopPropagation(); selectDevice(d.id); });
                    el.addEventListener('mousedown', makeDraggable);
                    canvas.appendChild(el);
                });
                redrawLines();
            }

            function makeDraggable(e) {
                const el = e.currentTarget;
                const id = parseInt(el.id.split('-')[1]);
                const device = devices.find(d => d.id === id);
                let offsetX = e.clientX - el.offsetLeft;
                let offsetY = e.clientY - el.offsetTop;
                function move(e) {
                    device.x = e.clientX - offsetX;
                    device.y = e.clientY - offsetY;
                    el.style.left = device.x + 'px';
                    el.style.top = device.y + 'px';
                    redrawLines();
                }
                function up() {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', up);
                }
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            }

            function selectDevice(id) {
                if (mode === 'connect') {
                    if (!connectFrom) {
                        connectFrom = id;
                    } else {
                        addConnection(connectFrom, id);
                        connectFrom = null;
                    }
                    return;
                }
                selectedDeviceId = id;
                showPropsPanel(id);
            }

            function addConnection(fromId, toId) {
                if (fromId === toId) return;
                const exists = connections.some(c => (c.from === fromId && c.to === toId) || (c.from === toId && c.to === fromId));
                if (!exists) {
                    connections.push({ from: fromId, to: toId });
                    redrawLines();
                }
            }

            function redrawLines() {
                lines.forEach(l => l.remove());
                lines = [];
                connections.forEach(c => {
                    const fromEl = document.getElementById(`dev-${c.from}`);
                    const toEl = document.getElementById(`dev-${c.to}`);
                    if (fromEl && toEl) {
                        try {
                            const line = new LeaderLine(fromEl, toEl, { color: '#6bb1ff', size: 2, startPlug: 'behind', endPlug: 'behind' });
                            lines.push(line);
                        } catch (e) { }
                    }
                });
            }

            window.clearConnections = function () {
                connections = [];
                redrawLines();
            };

            function showPropsPanel(id) {
                const dev = devices.find(d => d.id === id);
                if (!dev) return;
                const panel = document.getElementById('propsPanel');
                panel.style.display = 'block';

                let html = `<div class="props-grid">`;
                html += `<span class="props-label">Nombre:</span><input class="input-field" id="propName" value="${dev.name}">`;

                if (dev.type === 'pc') {
                    html += `<span class="props-label">IP:</span><input class="input-field" id="propIP" value="${dev.props.ip || ''}">`;
                    html += `<span class="props-label">Máscara:</span><input class="input-field" id="propMask" value="${dev.props.mask || ''}">`;
                    html += `<span class="props-label">Gateway:</span><input class="input-field" id="propGW" value="${dev.props.gateway || ''}">`;
                    html += `<span class="props-label">VLAN:</span><input class="input-field" id="propVLAN" value="${dev.props.vlan || ''}">`;
                    html += `<span class="props-label">Puerto Switch:</span><input class="input-field" id="propSwitchPort" value="${dev.props.switchPort || 'fa0/1'}">`;
                } else if (dev.type === 'switch') {
                    html += `<span class="props-label">Puerto Trunk:</span><input class="input-field" id="propTrunkPort" value="${dev.props.trunkPort || 'fa0/24'}">`;
                    html += `</div><hr style="margin:15px 0; border-color:#2a4057;">`;
                    html += `<h5 style="margin-bottom:10px;"><i class="fas fa-layer-group"></i> Rangos de VLANs</h5>`;
                    html += `<div id="vlanRangesContainer">`;
                    if (dev.props.vlanRanges && dev.props.vlanRanges.length > 0) {
                        dev.props.vlanRanges.forEach((vr, idx) => {
                            html += `<div class="connection-row"><input class="input-field" placeholder="VLAN" value="${vr.vlan}" id="vlanRangeVlan_${idx}" style="width:30%"><input class="input-field" placeholder="Rango (ej: fa0/1-5)" value="${vr.range}" id="vlanRangeRange_${idx}" style="width:50%"><button class="btn" onclick="removeVlanRange(${id}, ${idx})"><i class="fas fa-trash"></i></button></div>`;
                        });
                    }
                    html += `</div>`;
                    html += `<button class="btn" style="margin-top:8px;" onclick="addVlanRange(${id})"><i class="fas fa-plus"></i> Añadir rango</button>`;
                } else if (dev.type === 'router') {
                    html += `<span class="props-label">Interfaz LAN:</span><input class="input-field" id="propLanInterface" value="${dev.props.lanInterface || 'g0/0'}">`;
                    html += `<span class="props-label">IP LAN:</span><input class="input-field" id="propLanIp" value="${dev.props.lanIp || ''}">`;
                    html += `<span class="props-label">Máscara LAN:</span><input class="input-field" id="propLanMask" value="${dev.props.lanMask || ''}">`;
                    html += `<span class="props-label">Interfaz Serial:</span><input class="input-field" id="propSerialInterface" value="${dev.props.serialInterface || 's0/0/0'}">`;
                    html += `<span class="props-label">IP Serial:</span><input class="input-field" id="propSerialIp" value="${dev.props.serialIp || ''}">`;
                    html += `<span class="props-label">Máscara Serial:</span><input class="input-field" id="propSerialMask" value="${dev.props.serialMask || ''}">`;
                    html += `<span class="props-label">Next-Hop:</span><input class="input-field" id="propNextHop" value="${dev.props.nextHop || ''}">`;
                }

                if (dev.type !== 'switch') html += `</div>`;
                document.getElementById('devicePropsForm').innerHTML = html;
            }

            window.addVlanRange = function (switchId) {
                const sw = devices.find(d => d.id === switchId);
                if (!sw) return;
                if (!sw.props.vlanRanges) sw.props.vlanRanges = [];
                sw.props.vlanRanges.push({ vlan: '10', range: 'fa0/1-5' });
                showPropsPanel(switchId);
            };

            window.removeVlanRange = function (switchId, index) {
                const sw = devices.find(d => d.id === switchId);
                if (sw && sw.props.vlanRanges) {
                    sw.props.vlanRanges.splice(index, 1);
                    showPropsPanel(switchId);
                }
            };

            window.updateDeviceProps = function () {
                if (selectedDeviceId === null) return;
                const dev = devices.find(d => d.id === selectedDeviceId);

                dev.name = document.getElementById('propName')?.value || dev.name;

                if (dev.type === 'pc') {
                    dev.props.ip = document.getElementById('propIP')?.value;
                    dev.props.mask = document.getElementById('propMask')?.value;
                    dev.props.gateway = document.getElementById('propGW')?.value;
                    dev.props.vlan = document.getElementById('propVLAN')?.value;
                    dev.props.switchPort = document.getElementById('propSwitchPort')?.value;
                } else if (dev.type === 'switch') {
                    dev.props.trunkPort = document.getElementById('propTrunkPort')?.value;
                    if (dev.props.vlanRanges) {
                        dev.props.vlanRanges.forEach((vr, idx) => {
                            vr.vlan = document.getElementById(`vlanRangeVlan_${idx}`)?.value || vr.vlan;
                            vr.range = document.getElementById(`vlanRangeRange_${idx}`)?.value || vr.range;
                        });
                    }
                } else if (dev.type === 'router') {
                    dev.props.lanInterface = document.getElementById('propLanInterface')?.value;
                    dev.props.lanIp = document.getElementById('propLanIp')?.value;
                    dev.props.lanMask = document.getElementById('propLanMask')?.value;
                    dev.props.serialInterface = document.getElementById('propSerialInterface')?.value;
                    dev.props.serialIp = document.getElementById('propSerialIp')?.value;
                    dev.props.serialMask = document.getElementById('propSerialMask')?.value;
                    dev.props.nextHop = document.getElementById('propNextHop')?.value;
                }

                renderCanvas();
                selectDevice(selectedDeviceId);
            };

            window.generateFullConfig = function () {
                let config = `! ========== CONFIGURACIÓN GENERADA ==========\n`;
                const pcs = devices.filter(d => d.type === 'pc');
                const switches = devices.filter(d => d.type === 'switch');
                const routers = devices.filter(d => d.type === 'router');

                // 1. Configuración de PCs
                config += `\n! --- CONFIGURACIÓN DE PCs (en el SO) ---\n`;
                pcs.forEach(pc => {
                    config += `! ${pc.name}: IP ${pc.props.ip} ${pc.props.mask}  Gateway ${pc.props.gateway}  (Puerto Switch: ${pc.props.switchPort})\n`;
                });

                // 2. Configuración de Switches
                switches.forEach(sw => {
                    config += `\n! --- ${sw.name} (SWITCH) ---\n`;
                    config += `enable\nconfigure terminal\n`;

                    // Crear VLANs
                    const vlansSet = new Set(pcs.map(p => p.props.vlan));
                    if (sw.props.vlanRanges) {
                        sw.props.vlanRanges.forEach(vr => vlansSet.add(vr.vlan));
                    }
                    vlansSet.forEach(v => { config += `vlan ${v}\n name VLAN${v}\n`; });

                    // Asignar puertos de acceso a PCs
                    pcs.forEach(pc => {
                        config += `interface ${pc.props.switchPort || 'fa0/1'}\n switchport mode access\n switchport access vlan ${pc.props.vlan}\n no shutdown\n exit\n`;
                    });

                    // Aplicar rangos de VLANs
                    if (sw.props.vlanRanges) {
                        sw.props.vlanRanges.forEach(vr => {
                            config += `interface range ${vr.range}\n switchport mode access\n switchport access vlan ${vr.vlan}\n no shutdown\n exit\n`;
                        });
                    }

                    // Configurar trunks hacia routers
                    const trunkConnections = connections.filter(c => {
                        const fromDev = devices.find(d => d.id === c.from);
                        const toDev = devices.find(d => d.id === c.to);
                        return (fromDev?.type === 'switch' && toDev?.type === 'router') || (fromDev?.type === 'router' && toDev?.type === 'switch');
                    });

                    // Si hay conexiones a routers, configurar el puerto trunk especificado
                    trunkConnections.forEach(conn => {
                        const swId = devices.find(d => d.id === conn.from)?.type === 'switch' ? conn.from : conn.to;
                        if (swId === sw.id) {
                            const trunkPort = sw.props.trunkPort || 'fa0/24';
                            config += `interface ${trunkPort}\n switchport mode trunk\n`;
                            // Opcional: permitir todas las VLANs o especificar
                            const allVlans = Array.from(vlansSet).join(',');
                            if (allVlans) {
                                config += ` switchport trunk allowed vlan ${allVlans}\n`;
                            }
                            config += ` no shutdown\n exit\n`;
                        }
                    });

                    // También configurar trunks entre switches (si los hay)
                    const switchToSwitchConns = connections.filter(c => {
                        const fromDev = devices.find(d => d.id === c.from);
                        const toDev = devices.find(d => d.id === c.to);
                        return fromDev?.type === 'switch' && toDev?.type === 'switch';
                    });

                    switchToSwitchConns.forEach(conn => {
                        if (conn.from === sw.id || conn.to === sw.id) {
                            // Asumimos que el puerto de trunk entre switches es el mismo o se puede especificar
                            const trunkPort = sw.props.trunkPort || 'fa0/24';
                            config += `interface ${trunkPort}\n switchport mode trunk\n`;
                            const allVlans = Array.from(vlansSet).join(',');
                            if (allVlans) {
                                config += ` switchport trunk allowed vlan ${allVlans}\n`;
                            }
                            config += ` no shutdown\n exit\n`;
                        }
                    });
                    config += `end\n`;
                });

                // 3. Configuración de Routers
                routers.forEach((rt, idx) => {
                    config += `\n! --- ${rt.name} (ROUTER) ---\n`;
                    config += `enable\nconfigure terminal\n`;

                    // Subinterfaces para VLANs (Router-on-a-stick)
                    const vlansSet = new Set(pcs.map(p => p.props.vlan));
                    vlansSet.forEach(v => {
                        const gw = pcs.find(p => p.props.vlan === v)?.props.gateway || rt.props.lanIp;
                        config += `interface ${rt.props.lanInterface}.${v}\n encapsulation dot1Q ${v}\n ip address ${gw} ${rt.props.lanMask}\n no shutdown\n exit\n`;
                    });
                    config += `interface ${rt.props.lanInterface}\n no shutdown\n exit\n`;

                    // Conexiones Serial entre routers
                    const serialConns = connections.filter(c => {
                        const fromDev = devices.find(d => d.id === c.from);
                        const toDev = devices.find(d => d.id === c.to);
                        return fromDev?.type === 'router' && toDev?.type === 'router';
                    });

                    serialConns.forEach(conn => {
                        if (conn.from === rt.id || conn.to === rt.id) {
                            const isLocalFrom = conn.from === rt.id;
                            const remoteRouter = devices.find(d => d.id === (isLocalFrom ? conn.to : conn.from));

                            let localIp = rt.props.serialIp;
                            let remoteIp = remoteRouter?.props.serialIp;
                            let serialMask = rt.props.serialMask;

                            if (!localIp || !remoteIp) {
                                localIp = `10.0.${idx}.1`;
                                remoteIp = `10.0.${idx}.2`;
                                serialMask = '255.255.255.252';
                            }

                            config += `interface ${rt.props.serialInterface}\n ip address ${localIp} ${serialMask}\n no shutdown\n`;
                            if (isLocalFrom) config += ` clock rate 64000\n`;
                            config += ` exit\n`;

                            // Rutas estáticas
                            config += `ip route 0.0.0.0 0.0.0.0 ${remoteIp}\n`;

                            // Añadir rutas hacia redes LAN de otros routers
                            routers.forEach(otherRt => {
                                if (otherRt.id !== rt.id && otherRt.props.lanIp && otherRt.props.lanMask) {
                                    const network = otherRt.props.lanIp.split('.').slice(0, 3).join('.') + '.0';
                                    config += `ip route ${network} ${otherRt.props.lanMask} ${remoteIp}\n`;
                                }
                            });
                        }
                    });
                    config += `end\n`;
                });

                config += `\n! ========== FIN DEL SCRIPT ==========`;
                document.getElementById('configOutputText').innerText = config;
                document.getElementById('configOutputContainer').style.display = 'block';
            };

            window.copyConfig = function () {
                const text = document.getElementById('configOutputText').innerText;
                navigator.clipboard?.writeText(text);
                alert('Configuración copiada al portapapeles');
            };

            // Inicialización
            renderCanvas();
            setMode('select');
        })();
    </script>
</body>
